<VirtualHost *:80>
    ServerName play.farmplay.win
    ServerAdmin webmaster@playfarm.win

    DocumentRoot /var/www/html/fvrp/public

    <Directory /var/www/html/fvrp/public>
        AllowOverride All
        Require all granted
    </Directory>

    # ===============================
    # Reverb WebSocket Reverse Proxy
    # ===============================

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 86400

    RewriteEngine On

    # Handle WebSocket upgrades for Reverb
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws/(.*)$ ws://127.0.0.1:8080/$1 [P,L]

    # Forward normal HTTP requests to Reverb /app endpoint
    ProxyPass /ws http://127.0.0.1:8080/
    ProxyPassReverse /ws http://127.0.0.1:8080/

    ProxyPass /apps http://127.0.0.1:8080/apps
    ProxyPassReverse /apps http://127.0.0.1:8080/apps

    ErrorLog ${APACHE_LOG_DIR}/play_error.log
    CustomLog ${APACHE_LOG_DIR}/play_access.log combined
</VirtualHost>
