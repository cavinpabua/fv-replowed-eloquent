<VirtualHost *:443>
    ServerName play.farmplay.win
    DocumentRoot /var/www/html/fvrp/public

    <Directory /var/www/html/fvrp/public>
        AllowOverride All
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/ssl/cloudflare/play.farmplay.win.pem
    SSLCertificateKeyFile /etc/ssl/cloudflare/play.farmplay.win.key

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 86400

    RewriteEngine On

    # Reverb WebSocket upgrade under /ws
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws/(.*)$ ws://127.0.0.1:8080/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/play_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/play_ssl_access.log combined
</VirtualHost>
